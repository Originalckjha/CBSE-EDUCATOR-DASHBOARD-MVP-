deploy-staging:
name: Deploy to Staging
runs-on: ubuntu-latest
needs: build-and-push
if: github.ref == ‘refs/heads/main’ || github.event.inputs.environment == ‘staging’
environment:
name: staging
url: https://staging.cbseeducator.in

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4
  
  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}
  
  - name: Run database migrations
    run: |
      echo "Running database migrations on staging..."
      # Add migration commands here
  
  - name: Update ECS service - Backend
    run: |
      aws ecs update-service \
        --cluster ${{ env.ECS_CLUSTER }}-staging \
        --service ${{ env.ECS_SERVICE_BACKEND }} \
        --force-new-deployment \
        --region ${{ env.AWS_REGION }}
  
  - name: Update ECS service - Frontend
    run: |
      aws ecs update-service \
        --cluster ${{ env.ECS_CLUSTER }}-staging \
        --service ${{ env.ECS_SERVICE_FRONTEND }} \
        --force-new-deployment \
        --region ${{ env.AWS_REGION }}
  
  - name: Wait for deployment
    run: |
      aws ecs wait services-stable \
        --cluster ${{ env.ECS_CLUSTER }}-staging \
        --services ${{ env.ECS_SERVICE_BACKEND }} ${{ env.ECS_SERVICE_FRONTEND }} \
        --region ${{ env.AWS_REGION }}
  
  - name: Run smoke tests
    run: |
      echo "Running smoke tests on staging..."
      curl -f https://staging-api.cbseeducator.in/health || exit 1
      curl -f https://staging.cbseeducator.in || exit 1
  
  - name: Notify deployment success
    if: success()
    run: |
      echo "✅ Staging deployment successful!"
      echo "URL: https://staging.cbseeducator.in"
```

# ==========================================

# Deploy to Production

# ==========================================

deploy-production:
name: Deploy to Production
runs-on: ubuntu-latest
needs: [build-and-push, deploy-staging]
if: startsWith(github.ref, ‘refs/tags/v’) || github.event.inputs.environment == ‘production’
environment:
name: production
url: https://cbseeducator.in

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4
  
  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}
  
  - name: Create backup
    run: |
      echo "Creating database backup..."
      aws rds create-db-snapshot \
        --db-instance-identifier cbse-educator-prod \
        --db-snapshot-identifier backup-$(date +%Y%m%d-%H%M%S) \
        --region ${{ env.AWS_REGION }}
  
  - name: Run database migrations
    run: |
      echo "Running database migrations on production..."
      # Add migration commands with rollback strategy
  
  - name: Update ECS service - Backend (Blue-Green)
    run: |
      aws ecs update-service \
        --cluster ${{ env.ECS_CLUSTER }}-prod \
        --service ${{ env.ECS_SERVICE_BACKEND }} \
        --force-new-deployment \
        --region ${{ env.AWS_REGION }}
  
  - name: Wait for backend deployment
    run: |
      aws ecs wait services-stable \
        --cluster ${{ env.ECS_CLUSTER }}-prod \
        --services ${{ env.ECS_SERVICE_BACKEND }} \
        --region ${{ env.AWS_REGION }}
  
  - name: Health check - Backend
    run: |
      for i in {1..5}; do
        if curl -f https://api.cbseeducator.in/health; then
          echo "Backend health check passed"
          break
        fi
        if [ $i -eq 5 ]; then
          echo "Backend health check failed"
          exit 1
        fi
        sleep 10
      done
  
  - name: Update ECS service - Frontend
    run: |
      aws ecs update-service \
        --cluster ${{ env.ECS_CLUSTER }}-prod \
        --service ${{ env.ECS_SERVICE_FRONTEND }} \
        --force-new-deployment \
        --region ${{ env.AWS_REGION }}
  
  - name: Wait for frontend deployment
    run: |
      aws ecs wait services-stable \
        --cluster ${{ env.ECS_CLUSTER }}-prod \
        --services ${{ env.ECS_SERVICE_FRONTEND }} \
        --region ${{ env.AWS_REGION }}
  
  - name: Invalidate CloudFront cache
    run: |
      aws cloudfront create-invalidation \
        --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
        --paths "/*" \
        --region ${{ env.AWS_REGION }}
  
  - name: Run post-deployment tests
    run: |
      echo "Running production smoke tests..."
      curl -f https://api.cbseeducator.in/health || exit 1
      curl -f https://cbseeducator.in || exit 1
      echo "All health checks passed!"
  
  - name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    uses: actions/create-release@v1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      tag_name: ${{ github.ref_name }}
      release_name: Release ${{ github.ref_name }}
      body: |
        ## Changes in this Release
        - Automated deployment from CI/CD pipeline
        - See CHANGELOG.md for detailed changes
      draft: false
      prerelease: false
  
  - name: Notify deployment success
    if: success()
    uses: actions/github-script@v7
    with:
      script: |
        const message = `
        🚀 **Production Deployment Successful!**
        
        **Version:** ${context.ref}
        **Commit:** ${context.sha.substring(0, 8)}
        **Deployed by:** ${context.actor}
        **URL:** https://cbseeducator.in
        
        ✅ All health checks passed
        `;
        
        // Send notification via webhook or Slack
        console.log(message);
```

