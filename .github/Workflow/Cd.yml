name: CD Pipeline

on:
push:
branches: [ main ]
tags:
- ‘v*.*.*’
workflow_dispatch:
inputs:
environment:
description: ‘Deployment environment’
required: true
type: choice
options:
- staging
- production

env:
AWS_REGION: ap-south-1
ECR_REPOSITORY_FRONTEND: cbse-educator-frontend
ECR_REPOSITORY_BACKEND: cbse-educator-backend
ECS_CLUSTER: cbse-educator-cluster
ECS_SERVICE_FRONTEND: cbse-frontend-service
ECS_SERVICE_BACKEND: cbse-backend-service

jobs:

# ==========================================

# Build and Push Docker Images

# ==========================================

build-and-push:
name: Build & Push to ECR
runs-on: ubuntu-latest
outputs:
frontend-image: ${{ steps.build-frontend.outputs.image }}
backend-image: ${{ steps.build-backend.outputs.image }}

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4
  
  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}
  
  - name: Get previous task definition
    id: get-task-def
    run: |
      TASK_DEFINITION=$(aws ecs describe-services \
        --cluster ${{ env.ECS_CLUSTER }}-prod \
        --services ${{ env.ECS_SERVICE_BACKEND }} \
        --region ${{ env.AWS_REGION }} \
        --query 'services[0].taskDefinition' \
        --output text)
      
      PREVIOUS_REVISION=$(aws ecs describe-task-definition \
        --task-definition ${TASK_DEFINITION} \
        --region ${{ env.AWS_REGION }} \
        --query 'taskDefinition.revision' \
        --output text)
      
      ROLLBACK_REVISION=$((PREVIOUS_REVISION - 1))
      echo "rollback_revision=${ROLLBACK_REVISION}" >> $GITHUB_OUTPUT
  
  - name: Rollback ECS services
    run: |
      echo "Rolling back to revision ${{ steps.get-task-def.outputs.rollback_revision }}"
      
      aws ecs update-service \
        --cluster ${{ env.ECS_CLUSTER }}-prod \
        --service ${{ env.ECS_SERVICE_BACKEND }} \
        --task-definition ${TASK_FAMILY}:${{ steps.get-task-def.outputs.rollback_revision }} \
        --force-new-deployment \
        --region ${{ env.AWS_REGION }}
      
      aws ecs update-service \
        --cluster ${{ env.ECS_CLUSTER }}-prod \
        --service ${{ env.ECS_SERVICE_FRONTEND }} \
        --force-new-deployment \
        --region ${{ env.AWS_REGION }}
  
  - name: Wait for rollback
    run: |
      aws ecs wait services-stable \
        --cluster ${{ env.ECS_CLUSTER }}-prod \
        --services ${{ env.ECS_SERVICE_BACKEND }} ${{ env.ECS_SERVICE_FRONTEND }} \
        --region ${{ env.AWS_REGION }}
  
  - name: Verify rollback
    run: |
      curl -f https://api.cbseeducator.in/health || exit 1
      curl -f https://cbseeducator.in || exit 1
      echo "✅ Rollback successful!"
```

# ==========================================

# Notify Teams

# ==========================================

notify-deployment:
name: Notify Deployment Status
runs-on: ubuntu-latest
needs: [deploy-production]
if: always()

```
steps:
  - name: Send Slack notification
    uses: slackapi/slack-github-action@v1.24.0
    with:
      webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      payload: |
        {
          "text": "${{ needs.deploy-production.result == 'success' && '✅' || '❌' }} Production Deployment ${{ needs.deploy-production.result }}",
          "blocks": [
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Production Deployment Status*\n\n*Result:* ${{ needs.deploy-production.result }}\n*Version:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}\n*URL:* https://cbseeducator.in"
              }
            }
          ]
        }
  
  - name: Send email notification
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: ${{ secrets.SMTP_HOST }}
      server_port: ${{ secrets.SMTP_PORT }}
      username: ${{ secrets.SMTP_USER }}
      password: ${{ secrets.SMTP_PASSWORD }}
      subject: "Production Deployment: ${{ needs.deploy-production.result }}"
      to: ${{ secrets.DEPLOYMENT_EMAIL }}
      from: CBSE Educator CI/CD <noreply@cbseeducator.in>
      body: |
        Production deployment has ${{ needs.deploy-production.result }}.
        
        Details:
        - Version: ${{ github.ref_name }}
        - Commit: ${{ github.sha }}
        - Deployed by: ${{ github.actor }}
        - URL: https://cbseeducator.in
        
        Check the GitHub Actions logs for more details.
```

# ==========================================

# Deployment Notes

# ==========================================

# 

# Environments:

# - Staging: Automatic deployment on main branch push

# - Production: Manual approval required or tag-based deployment

# 

# To deploy to production:

# 1. Create and push a git tag: git tag v1.0.0 && git push origin v1.0.0

# 2. Or manually trigger workflow and select ‘production’ environment

# 

# To rollback:

# 1. Go to Actions tab

# 2. Select “CD Pipeline” workflow

# 3. Click “Run workflow”

# 4. This will trigger the rollback job

# 

# Required Secrets:

# - AWS_ACCESS_KEY_ID

# - AWS_SECRET_ACCESS_KEY

# - REACT_APP_API_BASE_URL

# - CLOUDFRONT_DISTRIBUTION_ID

# - SLACK_WEBHOOK_URL

# - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD

# - DEPLOYMENT_EMAIL

# ==========================================.AWS_SECRET_ACCESS_KEY }}

```
      aws-region: ${{ env.AWS_REGION }}
  
  - name: Login to Amazon ECR
    id: login-ecr
    uses: aws-actions/amazon-ecr-login@v2
  
  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3
  
  - name: Extract metadata
    id: meta
    run: |
      echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
      echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
  
  - name: Build and push Frontend image
    id: build-frontend
    uses: docker/build-push-action@v5
    with:
      context: ./frontend
      file: ./frontend/Dockerfile
      push: true
      tags: |
        ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
        ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ steps.meta.outputs.sha }}
        ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ steps.meta.outputs.timestamp }}
      cache-from: type=gha
      cache-to: type=gha,mode=max
      build-args: |
        REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
        REACT_APP_ENVIRONMENT=production
  
  - name: Build and push Backend image
    id: build-backend
    uses: docker/build-push-action@v5
    with:
      context: ./backend
      file: ./backend/Dockerfile
      push: true
      tags: |
        ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
        ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ steps.meta.outputs.sha }}
        ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ steps.meta.outputs.timestamp }}
      cache-from: type=gha
      cache-to: type=gha,mode=max
```

